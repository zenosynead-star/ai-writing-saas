databases:
  - name: ai-writing-saas-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    ipAllowList: [] # 公開IP不要・Renderサービスからのみ接続

services:
  - type: web
    name: ai-writing-saas
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-writing-saas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true     # Renderが自動でランダム値生成
      - key: GOOGLE_API_KEY
        sync: false             # Render Dashboardで手動投入（AI Studioで発行）
      - key: GEMINI_MODEL_HIGH
        value: gemini-2.5-pro
      - key: GEMINI_MODEL_BALANCED
        value: gemini-2.5-flash
      - key: GEMINI_MODEL_LOW
        value: gemini-2.5-flash-lite
